<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="电脑">
  <rect width="600" height="400" fill="#1b2a41"/>
  <!-- 显示器 -->
  <rect x="150" y="90" width="300" height="180" rx="12" fill="#0f1c2e" stroke="#4f9cf9" stroke-width="4"/>
  <rect x="170" y="110" width="260" height="140" rx="6" fill="#12283f"/>
  <g fill="#4f9cf9" opacity="0.85">
    <rect x="188" y="128" width="120" height="12" rx="6"/>
    <rect x="188" y="150" width="200" height="10" rx="5"/>
    <rect x="188" y="168" width="160" height="10" rx="5"/>
    <rect x="188" y="200" width="90" height="30" rx="6"/>
  </g>
  <!-- 支架 -->
  <rect x="285" y="270" width="30" height="30" fill="#0f1c2e"/>
  <rect x="240" y="300" width="120" height="14" rx="7" fill="#0f1c2e"/>
  <text x="300" y="360" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">电脑</text>
</svg>
